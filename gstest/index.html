<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <script
      src="https://code.jquery.com/jquery-3.7.1.min.js"
      integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
      crossorigin="anonymous"
    ></script>
    <script src="papaparse.min.js"></script>
    <script>
      Papa.parse(
        "https://docs.google.com/spreadsheets/d/17aAJv0fEf866iE9xs6C2Ngc_TOVwO9pfBLQ8eCY77Dg/gviz/tq?tqx=out:csv",
        {
          download: true,
          delimiter: ",",
          header: false,
          complete: function (results) {
            parsedData = results.data;
            //行の繰り返し処理
            for (var i = 0; i < parsedData.length; i++) {
              var row = parsedData[i];
              var html = "<tr>";
              //列の繰り返し処理
              for (var j = 0; j < row.length; j++) {
                var value = row[j];
                //1行目は見出しとして扱う 適宜調整してください
                if (i == 0) {
                  html += "<th><span>" + value + "</span></th>";
                } else {
                  html += "<td><span>" + value + "</span></td>";
                }
              }
              html += "</tr>";
              //trごとにテーブルタグに挿入
              $("#newsTableBody").append(html);
            }
          },
        },
      );
    </script>
    <title>サンプル HP</title>
  </head>

  <body>
    <h1>サンプル HP</h1>
    <p>ここはサンプル HP です。</p>
    <h2>お知らせ</h2>
    <table>
      <thead>
        <tr>
          <th>日付</th>
          <th>内容</th>
        </tr>
      </thead>
      <tbody id="newsTableBody"></tbody>
    </table>
  </body>
</html>
